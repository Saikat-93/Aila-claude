<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aila Launch — Scenes 1–3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Lora:wght@400&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     AILA LAUNCH FILM — SCENES 1–3
     Composition: text types inside a growing bubble (centered),
     bubble scales+docks top-right on send, comet ring thinks
     below-left, Lora reply types while ring rides beneath it.
     All constants in CONFIG at the top of the script.
     ============================================================ */
  :root{
    --bg:#FAF9F4; --bubble:#EEECE4; --ink:#14120E;
    --orange:#F5A623; --blue:#2196F3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden}

  /* fixed 2560x1440 stage scaled to window */
  #stage{position:absolute;top:50%;left:50%;width:2560px;height:1440px;
         transform-origin:center;background:var(--bg)}

  /* -------- user bubble -------- */
  #bubbleWrap{position:absolute;left:1280px;top:728px;
              transform:translate(-50%,-50%);
              will-change:transform;opacity:0}
  #bubble{background:var(--bubble);
          padding:66px 92px;               /* vertical pad tuned to line-height */
          border-radius:9999px;            /* pill when single line */
          font-family:'Inter',sans-serif;font-size:100px;line-height:1.22;
          color:var(--ink);white-space:pre-wrap;max-width:1644px;
          transition:border-radius .25s ease}
  #bubble.multi{border-radius:84px}
  #bubble .cur{display:inline-block;width:6px;height:112px;background:var(--ink);
               margin-left:14px;vertical-align:-12px;opacity:0}
  #bubble .cur.on{opacity:1}
  #bubble .cur.blink{animation:blink 1.06s steps(1) infinite}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

  /* -------- thinking ring -------- */
  #ringCv{position:absolute;left:0;top:0;pointer-events:none}

  /* -------- reply -------- */
  #reply{position:absolute;left:332px;top:770px;width:1750px;
         font-family:'Lora',serif;font-size:76px;line-height:1.45;color:var(--ink)}
  #reply .w{display:inline-block;opacity:0;transform:translateY(12px);
            transition:opacity .14s cubic-bezier(.33,1,.68,1),
                       transform .14s cubic-bezier(.33,1,.68,1);
            margin-right:.26em}
  #reply .w.on{opacity:1;transform:translateY(0)}
  #reply .emoji{font-size:1.05em}
</style>
</head>
<body>
<div id="stage">
  <div id="bubbleWrap"><div id="bubble"><span id="btxt"></span><span class="cur" id="cur"></span></div></div>
  <canvas id="ringCv" width="2560" height="1440"></canvas>
  <div id="reply"></div>
</div>

<script>
/* ================= CONFIG — edit freely ================= */
const CONFIG = {
  userText1: "Hi Aila,",
  userText2: "Hi Aila, I need a quick getaway this weekend.",
  replyText: "✈️ Absolutely! Where would you like to go?",

  // timeline (seconds) — mirrors the 4K render
  bubbleIn:   0.30,
  type1:      [0.55, 1.40],
  type2:      [2.10, 4.30],
  send:       [5.00, 5.50],
  thinkIn:    5.62,
  reply:      [6.60, 7.55],
  total:      8.00,

  // geometry (2560x1440 space) — measured from reference
  center:     [1280, 728],   // typing bubble center
  dockRight:  2176,          // docked right edge
  dockTop:    255,           // docked top edge
  dockScale:  0.78,
  ringCX:     396,           // ring center x
  ringR:      56,            // ring radius
  ringGapY:   190,           // gap below last reply line
  ringIdleY:  900,           // ring y while thinking (no reply yet)
  ringSpeed:  1.0,           // rotations / second

  loop: false
};
/* ======================================================== */

const stage=document.getElementById('stage');
const wrap=document.getElementById('bubbleWrap');
const bub=document.getElementById('bubble');
const btxt=document.getElementById('btxt');
const cur=document.getElementById('cur');
const cv=document.getElementById('ringCv'), ctx=cv.getContext('2d');
const replyEl=document.getElementById('reply');

function fit(){const s=Math.min(innerWidth/2560,innerHeight/1440);
  stage.style.transform=`translate(-50%,-50%) scale(${s})`}
addEventListener('resize',fit);fit();

const words=CONFIG.replyText.split(' ').map((w,i)=>{
  const s=document.createElement('span');
  s.className='w'+(i===0?' emoji':'');s.textContent=w;
  replyEl.appendChild(s);return s;
});

const clamp=(x,a=0,b=1)=>Math.max(a,Math.min(b,x));
const eoc=t=>1-Math.pow(1-clamp(t),3);
const eio=t=>{t=clamp(t);return t*t*(3-2*t)};
const lerp=(a,b,t)=>a+(b-a)*t;
const OR=[245,166,35], BL=[33,150,243];

function typed(t,[t0,t1],n){
  if(t<=t0)return 0; if(t>=t1)return n;
  return Math.round(n*(t-t0)/(t1-t0));
}

function drawRing(t,alpha,cx,cy,R){
  ctx.clearRect(0,0,2560,1440);
  if(alpha<=0)return;
  const head=(t*2*Math.PI*CONFIG.ringSpeed)%(2*Math.PI);
  const TRAIL=Math.PI*300/180,STEPS=56;
  for(let i=0;i<STEPS;i++){
    const f=i/(STEPS-1), ang=head-TRAIL*(1-f);
    const x=cx+R*Math.cos(ang), y=cy+R*Math.sin(ang);
    const c=[0,1,2].map(k=>Math.round(lerp(BL[k],OR[k],f)));
    ctx.beginPath();
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${Math.pow(f,1.6)*alpha})`;
    ctx.arc(x,y,lerp(R*0.055,R*0.16,Math.pow(f,1.4)),0,7);ctx.fill();
  }
  const hx=cx+R*Math.cos(head), hy=cy+R*Math.sin(head);
  ctx.beginPath();
  ctx.fillStyle=`rgba(${OR[0]},${OR[1]},${OR[2]},${alpha})`;
  ctx.arc(hx,hy,R*0.185,0,7);ctx.fill();
}

let ringY=null, t0=null;
function frame(now){
  if(t0===null)t0=now;
  let t=(now-t0)/1000;
  const C=CONFIG;
  if(C.loop&&t>C.total){t0=now;t=0;ringY=null;
    words.forEach(w=>w.classList.remove('on'))}

  /* ---- bubble: typing / send / docked ---- */
  if(t>=C.bubbleIn){
    let shown;
    if(t<C.type2[0]) shown=C.userText1.slice(0,typed(t,C.type1,C.userText1.length));
    else{const ex=C.userText2.slice(C.userText1.length);
         shown=C.userText1+ex.slice(0,typed(t,C.type2,ex.length))}
    btxt.textContent=shown;
    bub.classList.toggle('multi', bub.offsetHeight>260);

    const typing=(t>=C.type1[0]&&t<C.type1[1])||(t>=C.type2[0]&&t<C.type2[1]);
    const preSend=t<C.send[0];
    cur.classList.toggle('on',preSend);
    cur.classList.toggle('blink',preSend&&!typing);

    // pop-in
    const ai=eoc((t-C.bubbleIn)/0.28);
    let sc=0.92+0.08*ai, x=C.center[0], y=C.center[1], op=ai;

    if(t>=C.send[0]){
      const p=eio((t-C.send[0])/(C.send[1]-C.send[0]));
      sc=lerp(1,C.dockScale,p);op=1;
      // docked center derived from current bubble box size
      const bw=bub.offsetWidth, bh=bub.offsetHeight;
      const dcx=C.dockRight-bw*C.dockScale/2, dcy=C.dockTop+bh*C.dockScale/2;
      x=lerp(C.center[0],dcx,p); y=lerp(C.center[1],dcy,p);
    }
    wrap.style.opacity=op;
    wrap.style.left=x+'px'; wrap.style.top=y+'px';
    wrap.style.transform=`translate(-50%,-50%) scale(${sc})`;
  }

  /* ---- reply words ---- */
  let nOn=0;
  if(t>=C.reply[0]){
    const per=(C.reply[1]-C.reply[0])/words.length;
    words.forEach((w,i)=>{
      const on=t>=C.reply[0]+i*per;
      w.classList.toggle('on',on); if(on)nOn=i+1;
    });
  }

  /* ---- ring ---- */
  if(t>=C.thinkIn-0.05){
    let tgt=C.ringIdleY;
    if(nOn>0){
      const last=words[nOn-1];
      tgt=770+last.offsetTop+C.ringGapY;
    }
    if(ringY===null)ringY=tgt;
    ringY+=(tgt-ringY)*0.22;
    const a=eoc((t-C.thinkIn)/0.30);
    const sc=0.85+0.15*eoc((t-C.thinkIn)/0.45);
    drawRing(t,clamp(a),C.ringCX,ringY,C.ringR*sc);
  }else{
    ctx.clearRect(0,0,2560,1440);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
